<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Icono de evento">
    <!-- Favicon: calendario con distintivo de evento -->
    <rect width="128" height="128" fill="transparent" />

    <!-- Calendar body -->
    <rect x="12" y="20" width="104" height="88" rx="12" class="calendar-body" />

    <!-- Top bar -->
    <rect x="18" y="28" width="92" height="20" rx="6" class="calendar-top" />

    <!-- Date squares -->
    <rect x="26" y="62" width="18" height="18" rx="4" class="dot" />
    <rect x="54" y="62" width="18" height="18" rx="4" class="dot" />
    <rect x="82" y="62" width="18" height="18" rx="4" class="dot" />

    <!-- Event badge (circle + check) -->
    <circle cx="96" cy="92" r="12" class="badge" />
    <path d="M91 92l3 3 7-7" class="check" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" />

    <style>
        .calendar-body { fill: #ffffff; stroke: #9333ea; stroke-width: 6; }
        .calendar-top { fill: #9333ea; }
        .dot { fill: #ffffff; stroke: #9333ea; stroke-width: 3; }
        .badge { fill: #f97316; }
        .check { stroke: #ffffff; }

        @media (prefers-color-scheme: dark) {
            .calendar-body { fill: #0f172a; stroke: #ffffff; }
            .calendar-top { fill: #ffffff; }
            .dot { fill: #0f172a; stroke: #ffffff; }
        }
    </style>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Paisaje">
    <defs>
        <linearGradient id="gSky" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#9ad6ff"/>
            <stop offset="100%" stop-color="#cfeefe"/>
        </linearGradient>
        <linearGradient id="gLake" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#6ec1ff"/>
            <stop offset="100%" stop-color="#9fe0ff"/>
        </linearGradient>
        <linearGradient id="gMountA" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#6b4fb2"/>
            <stop offset="100%" stop-color="#563b96"/>
        </linearGradient>
        <linearGradient id="gMountB" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#8b6ad1"/>
            <stop offset="100%" stop-color="#6e49b3"/>
        </linearGradient>
        <linearGradient id="gGrass" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#6fd07e"/>
            <stop offset="100%" stop-color="#40a86b"/>
        </linearGradient>
    </defs>

    <!-- NOTE: No outer frame or background rectangles — transparent canvas -->

    <!-- Sky -->
    <rect x="0" y="0" width="128" height="64" fill="url(#gSky)" rx="0"/>

    <!-- Distant mountains -->
    <path d="M4 64 L36 28 L68 64 Z" fill="url(#gMountA)"/>
    <path d="M44 64 L80 18 L116 64 Z" fill="url(#gMountB)"/>

    <!-- Small trees on the plain -->
    <g fill="#2e9b47">
        <path d="M18 64 L24 52 L30 64 Z"/>
        <path d="M54 64 L60 50 L66 64 Z"/>
        <path d="M92 64 L98 52 L104 64 Z"/>
    </g>

    <!-- Grass strip -->
    <rect x="0" y="64" width="128" height="20" fill="url(#gGrass)"/>

    <!-- Lake -->
    <path d="M0 84 C30 72 98 72 128 84 L128 128 L0 128 Z" fill="url(#gLake)"/>

    <!-- Tiny foreground details (rocks/trees) -->
    <g fill="#2f8d4e" opacity="0.95">
        <circle cx="36" cy="76" r="2"/>
        <circle cx="74" cy="86" r="2"/>
    </g>

</svg>
